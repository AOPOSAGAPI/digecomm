<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title">DIGECOMM IKE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --main-blue: #003366; }
        .navbar { background: white !important; border-bottom: 3px solid var(--main-blue); padding: 10px 0; }
        .carousel-item { height: 600px; background-size: cover; background-position: center; }
        .lang-btn { background: none; border: 2px solid var(--main-blue); color: var(--main-blue); padding: 5px 10px; cursor: pointer; font-weight: bold; border-radius: 5px; }
        .lang-btn.active { background: var(--main-blue); color: white; }
        .carousel-caption-custom { background: rgba(0, 51, 102, 0.7); padding: 30px; border-radius: 15px; }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="#"><img src="digecomm logo transparent.png" style="height: 70px;"></a>
        <div class="d-flex align-items-center">
            <div class="lang-selector me-3">
                <button class="lang-btn active" data-lang="el">ΕΛ</button>
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="tr">TR</button>
            </div>
            <a href="tel:+306948985340" id="nav-phone" data-i18n="phone" class="fw-bold text-decoration-none" style="color: #003366;">📞 +30 694 898 5340</a>
        </div>
    </div>
</nav>

<div id="mainCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel">
    <div class="carousel-inner">
        <div class="carousel-item active" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('technical.jpg');">
            <div class="container h-100 d-flex align-items-center justify-content-center text-center text-white">
                <div class="carousel-caption-custom">
                    <h1 class="display-3 fw-bold">DIGECOMM IKE</h1>
                    <p class="lead fs-2" data-i18n="hero_tagline_tech">Τεχνικές Υπηρεσίες & Ανακαινίσεις</p>
                    <a href="tel:+306948985340" class="btn btn-warning btn-lg fw-bold" data-i18n="contact_button">ΕΠΙΚΟΙΝΩΝΙΑ</a>
                </div>
            </div>
        </div>
        <div class="carousel-item" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('call_center.jpg');">
            <div class="container h-100 d-flex align-items-center justify-content-center text-center text-white">
                <div class="carousel-caption-custom">
                    <h2 class="display-3 fw-bold">Business Support</h2>
                    <p class="lead fs-2" data-i18n="hero_tagline_business">Υποστήριξη Επιχειρησιακών Διαδικασιών</p>
                </div>
            </div>
        </div>
        <div class="carousel-item" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('cleaner.jpg');">
            <div class="container h-100 d-flex align-items-center justify-content-center text-center text-white">
                <div class="carousel-caption-custom">
                    <h2 class="display-3 fw-bold">Facility Management</h2>
                    <p class="lead fs-2" data-i18n="hero_tagline_facility">Ολοκληρωμένη Διαχείριση Εγκαταστάσεων</p>
                </div>
            </div>
        </div>
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#mainCarousel" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
    <button class="carousel-control-next" type="button" data-bs-target="#mainCarousel" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const translations = {
    el: {
        "phone": "📞 +30 694 898 5340",
        "hero_tagline_tech": "Τεχνικές Υπηρεσίες & Ανακαινίσεις",
        "hero_tagline_business": "Υποστήριξη Επιχειρησιακών Διαδικασιών",
        "hero_tagline_facility": "Ολοκληρωμένη Διαχείριση Εγκαταστάσεων",
        "contact_button": "ΕΠΙΚΟΙΝΩΝΙΑ"
    },
    en: {
        "phone": "📞 +30 694 898 5340",
        "hero_tagline_tech": "Technical Services & Renovations",
        "hero_tagline_business": "Business Process Support",
        "hero_tagline_facility": "Complete Facility Management",
        "contact_button": "CONTACT"
    },
    tr: {
        "phone": "📞 +30 693 3061 106",
        "hero_tagline_tech": "Teknik Hizmetler και Yenileme",
        "hero_tagline_business": "İş Süreçleri Desteği",
        "hero_tagline_facility": "Tesis Yönetimi",
        "contact_button": "İLETİŞİM"
    }
};

function updateContent(lang) {
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (translations[lang] && translations[lang][key]) {
            el.innerHTML = translations[lang][key];
            if (key === 'phone') {
                const num = translations[lang][key].replace('📞 ', '').replace(/\s/g, '');
                el.setAttribute('href', 'tel:' + num);
            }
        }
    });
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
    });
}

document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', function() {
        updateContent(this.getAttribute('data-lang'));
    });
});
</script>
</body>
</html>
